version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: orion-db
    environment:
      POSTGRES_DB: orion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orion"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./orion-backend
    container_name: orion-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/orion
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - ORION_ENCRYPTION_KEY=mySecretEncryptionKey12345678901
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - orion_storage:/app/storage

  frontend:
    build: ./orion-frontend
    container_name: orion-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  orion_storage:
