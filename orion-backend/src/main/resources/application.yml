spring:
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

orion:
  mail:
    from: ${ORION_MAIL_FROM:noreply@orion-testing.com}
  # SSL config for outbound HTTPS connections (HTTP/SOAP/GraphQL executors, recording proxy)
  # and for server-side TLS (driven by server.ssl.* below).
  # To use a custom certificate: replace the JKS files in resources/security/ and restart,
  # or set SSL_KEY_STORE / SSL_TRUST_STORE env vars in prod (see application-prod.yml).
  ssl:
    key-store: classpath:security/orion-keystore.jks
    key-store-password: changeit
    key-store-type: JKS
    key-alias: orion
    trust-store: classpath:security/orion-truststore.jks
    trust-store-password: changeit
    trust-store-type: JKS
  # Playwright / browser automation SSL options.
  # ignore-https-errors: true  -- Playwright Chromium accepts self-signed and internal CA certs.
  # Set to false for strict certificate validation in browser automation steps.
  browser:
    ignore-https-errors: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
  ssl:
    enabled: false
    key-store: classpath:security/orion-keystore.jks
    key-store-password: changeit
    key-store-type: JKS
    key-alias: orion
    trust-store: classpath:security/orion-truststore.jks
    trust-store-password: changeit
    trust-store-type: JKS

jwt:
  secret: ${JWT_SECRET:orion-default-secret-change-in-production-minimum-256-bits-long-key-here-yes}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

logging:
  level:
    root: INFO
    com.axon.orion: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN