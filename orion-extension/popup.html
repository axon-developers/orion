<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      width: 300px;
      margin: 0;
      padding: 15px;
      background-color: #0F172A;
      color: #F8FAFC;
    }
    h3 {
      margin-top: 0;
      color: #38BDF8;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      font-weight: bold;
      color: #94A3B8;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #334155;
      border-radius: 6px;
      background-color: #1E293B;
      color: #F8FAFC;
      font-size: 12px;
      outline: none;
    }
    input:focus {
      border-color: #38BDF8;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background-color 0.2s;
    }
    .btn-primary {
      background-color: #0284C7;
      color: #FFFFFF;
    }
    .btn-primary:hover {
      background-color: #0369A1;
    }
    .btn-danger {
      background-color: #E11D48;
      color: #FFFFFF;
    }
    .btn-danger:hover {
      background-color: #BE123C;
    }
    .status-text {
      font-size: 11px;
      color: #94A3B8;
      text-align: center;
      margin-top: 10px;
    }
    .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #EF4444;
      animation: pulse-anim 1.5s infinite;
      margin-right: 5px;
    }
    @keyframes pulse-anim {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body>
  <h3>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #38BDF8;"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
    Orion Test Recorder
  </h3>
  
  <div id="recording-inactive">
    <div class="form-group">
      <label for="url">Starting URL</label>
      <input type="text" id="url" placeholder="https://example.com/login" value="https://">
    </div>
    <button id="start-btn" class="btn-primary">Start Recording</button>
  </div>
  
  <div id="recording-active" style="display: none;">
    <button id="stop-btn" class="btn-danger">Stop & Save Actions</button>
    <div class="status-text">
      <span class="pulse"></span> Recording in progress...
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
